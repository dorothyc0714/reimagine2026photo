name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install
        run: npm ci

      - name: Create .env from GitHub Secret
        env:
          REIMAGINE: ${{ secrets.REIMAGINE }}
        run: |
          if [ -z "$REIMAGINE" ]; then
            echo "Missing secret: REIMAGINE"
            echo "Please create a repository secret named REIMAGINE with lines like KEY=value (same as your local .env)."
            exit 1
          fi
          # Write without leaking to logs
          printf "%s" "$REIMAGINE" > .env

      - name: Fetch from Lark Base
        run: npm run fetch

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

